name: Normalize issue titles

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  issues: write

jobs:
  normalize-title:
    runs-on: ubuntu-latest
    steps:
      - name: Normalize issue title
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || "";

            const mapMatch = body.match(/^### (?:Map name|Workshop map name\.?)\s*$\r?\n\r?\n(.+?)\s*(?:\r?\n|$)/mi);
            if (!mapMatch) {
              core.info("No Map name field found in issue body.");
              return;
            }

            const mapName = mapMatch[1].trim();
            if (!mapName) {
              core.info("Map name is empty.");
              return;
            }

            const currentTitle = (issue.title || "").trim();

            // Keep normalization idempotent by removing the same map prefix if it is already present.
            const escapedMapName = mapName.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            const sameMapPrefixPattern = new RegExp(`^\\[${escapedMapName}\\]:\\s*`, "i");
            const userTitle = currentTitle.replace(sameMapPrefixPattern, "").trim();

            if (!userTitle) {
              core.info("No user title remains after normalization.");
              return;
            }

            const normalizedTitle = `[${mapName}]: ${userTitle}`;

            if (normalizedTitle === currentTitle) {
              core.info("Issue title is already normalized.");
              return;
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              title: normalizedTitle,
            });

            core.info(`Updated title to: ${normalizedTitle}`);